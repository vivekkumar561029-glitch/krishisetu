<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KrishiSetu Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="overlay"></div>
      <div class="watermark-logo">Krishi Setu</div>
      <section class="auth-card">
        <div class="card-highlight"></div>
        <h1 id="login-title">Login</h1>
        <p id="login-subtitle">Enter your mobile number to continue</p>

        <label class="input-label" for="mobile-number" id="mobile-label">
          Mobile Number
        </label>
        <div class="mobile-field" id="mobile-field">
          <span class="country-code">
            <span class="flag" aria-hidden="true">🇮🇳</span>
            <span>+91</span>
          </span>
          <input
            id="mobile-number"
            type="tel"
            inputmode="numeric"
            maxlength="10"
            placeholder="Enter mobile number"
            aria-label="Mobile Number"
          />
        </div>
        <p id="mobile-error" class="error-text" aria-live="polite"></p>

        <button id="otp-button" class="primary-button" type="button" disabled>
          Generate OTP
        </button>
      </section>
    </main>

    <div class="modal-backdrop" id="success-modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-message">
        <p id="modal-message" class="modal-message">OTP sent successfully</p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
