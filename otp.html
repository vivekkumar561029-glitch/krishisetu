<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KrishiSetu OTP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="otp.css" />
    <!-- Apply saved theme before paint — no flash -->
    <script>
      (function () {
        var t = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body>
    <main class="page-shell">
      <div class="overlay"></div>
      <div class="watermark-logo">Krishi Setu</div>
      <section class="auth-card">
        <h1 id="otp-title">Enter OTP</h1>
        <label class="input-label" for="otp-input" id="otp-label">OTP</label>
        <input
          id="otp-input"
          type="text"
          inputmode="numeric"
          maxlength="6"
          placeholder="Enter OTP"
          aria-label="OTP"
        />
        <p id="otp-error" class="error-text" aria-live="polite"></p>

        <p id="resend-text" class="resend-text">Resend OTP in 30s</p>
        <button id="resend-button" class="secondary-button hidden" type="button">
          Resend OTP
        </button>

        <button id="verify-button" class="primary-button" type="button">
          Verify
        </button>
      </section>
    </main>

    <div class="modal-backdrop" id="success-modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-message">
        <p id="modal-message" class="modal-message">OTP Verified</p>
      </div>
    </div>

    <script src="otp.js"></script>
  </body>
</html>
