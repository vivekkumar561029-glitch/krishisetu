<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krishi Setu Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="edit-profile">

  <!-- PNG-style SVG watermark (light opacity, theme-aware) -->
  <div class="watermark-bg" aria-hidden="true">
    <svg viewBox="0 0 900 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .wm { fill: #2E7D32; opacity: var(--watermark-opacity, 0.045); font-family: Arial, sans-serif; font-weight: 800; }
        </style>
      </defs>
      <text class="wm" font-size="52" x="30"  y="100">Krishi Setu</text>
      <text class="wm" font-size="52" x="420" y="100">Krishi Setu</text>
      <text class="wm" font-size="52" x="30"  y="220">Krishi Setu</text>
      <text class="wm" font-size="52" x="420" y="220">Krishi Setu</text>
      <text class="wm" font-size="52" x="30"  y="340">Krishi Setu</text>
      <text class="wm" font-size="52" x="420" y="340">Krishi Setu</text>
      <text class="wm" font-size="52" x="30"  y="460">Krishi Setu</text>
      <text class="wm" font-size="52" x="420" y="460">Krishi Setu</text>
      <text class="wm" font-size="52" x="30"  y="580">Krishi Setu</text>
      <text class="wm" font-size="52" x="420" y="580">Krishi Setu</text>
      <text class="wm" font-size="36" x="200" y="160">🌱</text>
      <text class="wm" font-size="36" x="600" y="160">🌱</text>
      <text class="wm" font-size="36" x="200" y="400">🌱</text>
      <text class="wm" font-size="36" x="600" y="400">🌱</text>
    </svg>
  </div>

  <!-- Dark/Light mode toggle -->
  <div class="theme-toggle-bar">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
      <span class="theme-toggle-icon">☀️</span>
      <span class="theme-toggle-icon">🌙</span>
      <span class="theme-toggle-knob"></span>
    </button>
  </div>

  <main class="app-shell">
    <form class="profile-card form-card" id="profileForm" novalidate>
      <div class="brand-watermark" aria-hidden="true">Krishi Setu</div>

      <div class="photo-editor">
        <div class="avatar avatar-large" id="photoPreview">
          <span class="avatar-initials" id="editInitials">FB</span>
        </div>
        <label class="btn btn-upload" for="profilePhotoInput">
          <span aria-hidden="true">+</span>
          Upload Photo
        </label>
        <input class="sr-only" id="profilePhotoInput" name="profilePhoto" type="file" accept=".jpg,.jpeg,.png,image/jpeg,image/png">
        <button class="btn btn-danger btn-small" id="removePhotoBtn" type="button" hidden>Remove Photo</button>
        <p class="error photo-error" id="profilePhotoError"></p>
      </div>

      <div class="section-block">
        <h3>Personal Details</h3>
        <div class="form-grid">
          <div class="field">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" maxlength="50" required>
            <small>Name should be as per your document</small>
            <p class="error" id="fullNameError"></p>
          </div>

          <div class="field">
            <label for="dob">Date of Birth</label>
            <input id="dob" name="dob" type="date" required>
            <small>Date of birth should be as per your document</small>
            <p class="error" id="dobError"></p>
          </div>

          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
              <option value="">Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
            <p class="error" id="genderError"></p>
          </div>

          <div class="field mobile-field">
            <label for="mobile">Mobile Number</label>
            <input id="mobile" name="mobile" type="tel" inputmode="numeric" maxlength="10" required>
            <div class="otp-panel" id="otpPanel" hidden>
              <div class="otp-row">
                <input id="otpInput" type="text" inputmode="numeric" maxlength="6" placeholder="Enter OTP">
                <button class="btn btn-small" id="verifyOtpBtn" type="button">Verify</button>
              </div>
              <div class="otp-actions">
                <button class="link-button" id="resendOtpBtn" type="button">Resend OTP</button>
                <span id="otpTimer">30s</span>
              </div>
            </div>
            <p class="status-text" id="mobileStatus"></p>
            <p class="error" id="mobileError"></p>
          </div>

          <div class="field">
            <label for="state">State</label>
            <select id="state" name="state" required>
              <option value="">Select state</option>
            </select>
            <p class="error" id="stateError"></p>
          </div>

          <div class="field">
            <label for="district">District</label>
            <select id="district" name="district" required>
              <option value="">Select district</option>
            </select>
            <p class="error" id="districtError"></p>
          </div>

          <div class="field field-wide">
            <label for="address">Address Line</label>
            <input id="address" name="address" type="text" required>
            <p class="error" id="addressError"></p>
          </div>

          <div class="field">
            <label for="userType">User Type</label>
            <select id="userType" name="userType" required>
              <option value="">Select user type</option>
              <option value="Farmer">Farmer</option>
              <option value="Buyer">Buyer</option>
            </select>
            <p class="error" id="userTypeError"></p>
          </div>
        </div>
      </div>

      <div class="section-block conditional-fields" id="farmerFields" hidden>
        <h3>Farmer Details</h3>
        <div class="form-grid">
          <div class="field">
            <label for="farmerType">Farmer Type</label>
            <select id="farmerType" name="farmerType">
              <option value="">Select farmer type</option>
              <option value="Small">Small</option>
              <option value="Medium">Medium</option>
              <option value="Large">Large</option>
            </select>
            <p class="error" id="farmerTypeError"></p>
          </div>

          <div class="field land-area-field">
            <label for="landArea">Land Area</label>
            <div class="land-area-control">
              <input id="landArea" name="landArea" type="text" inputmode="decimal" placeholder="1000">
              <select id="landUnit" name="landUnit" aria-label="Land area unit">
                <option value="">Unit</option>
                <option value="Acre">Acre</option>
                <option value="Hectare">Hectare</option>
                <option value="Bigha">Bigha</option>
                <option value="Cent">Cent</option>
                <option value="Guntha">Guntha</option>
                <option value="Katha">Katha</option>
              </select>
            </div>
            <p class="error" id="landAreaError"></p>
            <p class="error" id="landUnitError"></p>
          </div>
        </div>
      </div>

      <div class="section-block conditional-fields" id="buyerFields" hidden>
        <h3>Buyer Details</h3>
        <div class="form-grid">
          <div class="field">
            <label for="buyerType">Buyer Type</label>
            <select id="buyerType" name="buyerType">
              <option value="">Select buyer type</option>
              <option value="Retailer">Retailer</option>
              <option value="Wholesaler">Wholesaler</option>
              <option value="Company">Company</option>
            </select>
            <p class="error" id="buyerTypeError"></p>
          </div>

          <div class="field">
            <label for="businessName">Business Name</label>
            <input id="businessName" name="businessName" type="text">
            <p class="error" id="businessNameError"></p>
          </div>

          <div class="field field-wide">
            <label for="businessAddress">Business Address</label>
            <input id="businessAddress" name="businessAddress" type="text">
            <p class="error" id="businessAddressError"></p>
          </div>

          <div class="field">
            <label for="gstNumber">GST Number</label>
            <input id="gstNumber" name="gstNumber" type="text" maxlength="15">
            <small>GST Number is required for company buyers</small>
            <p class="error" id="gstNumberError"></p>
          </div>
        </div>
      </div>

      <div class="section-block">
        <h3>Documents</h3>
        <div class="form-grid">
          <div class="field">
            <label for="documentType">Document Type</label>
            <select id="documentType" name="documentType" required>
              <option value="">Select document type</option>
              <option value="Aadhaar">Aadhaar</option>
              <option value="PAN">PAN</option>
              <option value="Voter ID">Voter ID</option>
              <option value="Driving License">Driving License</option>
            </select>
            <p class="error" id="documentTypeError"></p>
          </div>

          <div class="field field-wide">
            <label for="documentFile">Upload Document</label>
            <input id="documentFile" name="documentFile" type="file" accept=".jpg,.jpeg,.png,.pdf,image/jpeg,image/png,application/pdf">
            <div class="document-preview upload-preview" id="documentPreview">No document selected</div>
            <button class="btn btn-danger btn-small remove-document-btn" id="removeDocumentBtn" type="button" hidden>Remove Document</button>
            <p class="error" id="documentFileError"></p>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a class="btn btn-ghost" href="profile.html">Cancel</a>
        <button class="btn btn-reset" id="resetFormBtn" type="button">Reset</button>
        <button class="btn btn-save" type="submit">Save Profile</button>
      </div>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
