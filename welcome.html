<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KrishiSetu Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="welcome.css" />
    <!-- Apply saved theme before paint — prevents flash -->
    <script>
      (function () {
        var t = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body>

    <!-- Rectangular Dark / Light Mode Toggle (welcome page only) -->
    <button class="theme-toggle" id="theme-toggle" type="button">
      Light Mode
    </button>

    <main class="page-shell">
      <div class="overlay"></div>
      <div class="watermark-logo">Krishi Setu</div>
      <section class="auth-card">
        <div class="brand-mark"></div>
        <h1 id="welcome-title">Welcome to Krishi Setu</h1>
        <p id="language-label">Select Language</p>

        <div class="language-group">
          <button class="language-button" type="button" data-language="hi">
            <span class="language-text">हिंदी</span>
          </button>
          <button class="language-button active" type="button" data-language="en">
            <span class="language-text">English</span>
          </button>
        </div>

        <button id="start-button" class="primary-button" type="button">
          Get Started
        </button>
      </section>
    </main>

    <script src="welcome.js"></script>
  </body>
</html>
