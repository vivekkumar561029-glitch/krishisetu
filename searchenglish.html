<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KrishiSetu - Search</title>
  <link rel="stylesheet" href="searchstyle.css">
</head>
<body class="dark">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-start">
      <h2>🌾 KrishiSetu</h2>
      <a href="englishhomepage.html" class="search-home-link">Home</a>
    </div>

  <!-- SEARCH CARD -->
  <div class="container">

        <label>Phone Number</label>

    </div>
  </div>
