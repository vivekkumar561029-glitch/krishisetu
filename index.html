<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>कृषि सेतु</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="थीम बदलें">डार्क मोड</button>

    <main class="main-content">
      <section id="languagePage" class="page active" aria-labelledby="languageTitle">
        <div class="glass-card language-card">
          <p class="eyebrow">स्मार्ट कृषि प्लेटफ़ॉर्म</p>
          <h1 class="brand-name">कृषि सेतु</h1>
          <h2 id="languageTitle" class="page-title">अपनी भाषा चुनें</h2>
          <p class="page-subtitle">जारी रखने के लिए अपनी पसंदीदा भाषा चुनें</p>

          <div class="language-actions">
            <button class="primary-btn language-btn" type="button" data-language="हिंदी">हिंदी में जारी रखें</button>
            <button class="secondary-btn language-btn" type="button" data-language="English">English</button>
          </div>
        </div>
      </section>

      <section id="searchPage" class="page" aria-labelledby="searchTitle">
        <div class="glass-card search-card">
          <div class="card-header">
            <div>
              <p class="eyebrow">कृषि खरीद सहायता</p>
              <h2 id="searchTitle" class="page-title">उत्पाद खोजें</h2>
            </div>
            <span id="selectedLanguageBadge" class="language-badge" aria-live="polite">भाषा: हिंदी</span>
          </div>

          <form id="productForm" novalidate>
            <div class="form-grid">
              <div class="form-group">
                <label for="category">उत्पाद प्रकार</label>
                <select id="category" name="category" required>
                  <option value="">उत्पाद प्रकार चुनें</option>
                </select>
              </div>

              <div class="form-group">
                <label for="product">उत्पाद नाम</label>
                <select id="product" name="product" required disabled>
                  <option value="">पहले उत्पाद प्रकार चुनें</option>
                </select>
              </div>

              <div class="form-group">
                <label for="variety">उप-समूह / किस्म</label>
                <select id="variety" name="variety" required disabled>
                  <option value="">पहले उत्पाद नाम चुनें</option>
                </select>
              </div>

              <div class="form-group quantity-group">
                <label for="minQty">मात्रा सीमा (किलो में)</label>
                <div class="quantity-row">
                  <input id="minQty" name="minQty" type="number" min="0" step="0.1" placeholder="न्यूनतम मात्रा" required>
                  <input id="maxQty" name="maxQty" type="number" min="0" step="0.1" placeholder="अधिकतम मात्रा" required>
                </div>
              </div>
            </div>

            <p id="formMessage" class="form-message" aria-live="polite"></p>

            <button class="primary-btn submit-btn" type="submit">ऑर्डर खोजें</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
